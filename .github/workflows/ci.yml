name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore backend
        run: dotnet restore server/VolleyDraft.Api/VolleyDraft.Api.csproj

      - name: Build backend
        run: dotnet build server/VolleyDraft.Api/VolleyDraft.Api.csproj -c Release --no-restore

  docker:
    name: API Docker build
    runs-on: ubuntu-latest
    needs:
      - backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -t volley-draft-api:test server/VolleyDraft.Api
