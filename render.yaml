services:
  - type: web
    name: volley-draft-api
    runtime: docker
    plan: free
    dockerfilePath: server/VolleyDraft.Api/Dockerfile
    dockerContext: server/VolleyDraft.Api
    healthCheckPath: /health
    envVars:
      - key: Database__Provider
        value: Postgres
      - key: ConnectionStrings__Default
        fromDatabase:
          name: volley-draft-db
          property: connectionString
      - key: Jwt__Issuer
        value: VolleyDraft
      - key: Jwt__Audience
        value: VolleyDraftClient
      - key: Jwt__Key
        generateValue: true
      - key: Cors__Origins__0
        sync: false
      - key: Zalo__BridgeBaseUrl
        sync: false
      - key: Zalo__BridgeInternalKey
        sync: false
      - key: Zalo__CredentialEncryptionKey
        sync: false
      - key: Zalo__WebhookUrl
        sync: false
      - key: Zalo__WebhookKey
        sync: false
      - key: Public__BaseUrl
        sync: false
      - key: Ai__Endpoint
        sync: false
      - key: Ai__ApiKey
        sync: false
      - key: Ai__Model
        sync: false
      - key: Scheduler__Key
        sync: false
      - key: Scheduler__PollRefreshMinutes
        value: "20"
      - key: Scheduler__RetryMinutes
        value: "10"
      - key: Scheduler__UrgentWindowHours
        value: "1"
      - key: Scheduler__UrgentDelayMinutes
        value: "0"
      - key: ZaloBot__ConversationTtlMinutes
        value: "15"
      - key: ZaloBot__ExactCommandCooldownSeconds
        value: "2"
      - key: ZaloBot__AiCooldownSeconds
        value: "10"
      - key: ZaloBot__AiPerUserPerMinute
        value: "4"
      - key: ZaloBot__AiPerGroupPerMinute
        value: "20"
      - key: ZaloBot__AiStyleEnabled
        value: "true"
      - key: ZaloBot__ClassifierConfidenceThreshold
        value: "0.72"
      - key: ZaloBot__LearnedRuleSimilarityThreshold
        value: "0.82"
      - key: ZaloActivitySync__BoardPageSize
        value: "50"
      - key: ZaloActivitySync__MaxBoardPages
        value: "100"
      - key: ZaloActivitySync__IncrementalBoardPages
        value: "5"
      - key: ZaloActivitySync__MessageHistoryCount
        value: "2000"
      - key: ZaloActivitySync__RetryCount
        value: "4"
      - key: ZaloActivitySync__RetryDelayMs
        value: "750"
      - key: ZaloActivitySync__PauseBetweenRequestsMs
        value: "150"
      - key: ZaloActivitySync__IncrementalMinutes
        value: "60"
      - key: ZaloActivitySync__LeaseMinutes
        value: "10"

  - type: web
    name: volley-draft-zalo-bridge
    runtime: docker
    plan: free
    dockerfilePath: server/ZaloBridge/Dockerfile
    dockerContext: server/ZaloBridge
    healthCheckPath: /health
    envVars:
      - key: ZALO_BRIDGE_INTERNAL_KEY
        sync: false
      - key: ZALO_BRIDGE_MOCK
        value: "false"
      - key: ZALO_BRIDGE_API_KEEP_ALIVE
        value: "true"
      - key: ZALO_BRIDGE_API_KEEP_ALIVE_MINUTES
        value: "8"

  - type: web
    name: volley-draft-web
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: volley-draft-db
    databaseName: volley_draft
    user: volley_user
    plan: free
